<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAC Drywall - Gestão Nuvem</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plac-blue: #0d1b3e; }
        body { background: linear-gradient(135deg, #0d1b3e 0%, #1e293b 100%); background-attachment: fixed; min-height: 100vh; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .active-tab { background: rgba(59, 130, 246, 0.2) !important; border-left: 4px solid #3b82f6; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0d1b3e; }
        .logo-img { max-width: 180px; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }

        #print-area { display: none; background: white !important; color: black !important; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="print-area">
        <div style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin:0">PLAC DRYWALL</h2>
            <p style="font-size: 11px; margin: 5px 0;">Rua Neuza Francisca dos Santos, 434 - Jd. Recanto dos Sonhos - Sumaré/SP</p>
            <p style="font-size: 11px; font-weight: bold;">WhatsApp: (19) 98814-7888</p>
        </div>
        <div id="print-content" style="color: black;"></div>
    </div>

    <div id="login-screen">
        <div class="glass p-10 w-96 text-center shadow-2xl bg-white/5">
            <div class="mb-8"><img src="logo.png" alt="PLAC Drywall" class="logo-img"></div>
            <input type="password" id="passInput" placeholder="Senha" class="w-full p-4 rounded-2xl mb-4 text-center font-bold outline-none border border-white/10">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs hover:bg-blue-500 transition shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="app-content" class="h-screen flex" style="display: none;">
        <aside class="w-64 glass m-4 mr-2 flex flex-col">
            <div class="p-6 border-b border-white/10 mb-4 text-center"><img src="logo.png" alt="Logo" class="w-32 mx-auto"></div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="w-full flex items-center p-4 rounded-2xl text-sm active-tab"><i class="fas fa-chart-pie mr-3 text-blue-400"></i> Dashboard</button>
                <button onclick="showTab('pdv')" id="btn-pdv" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-shopping-cart mr-3"></i> Vendas</button>
                <button onclick="showTab('financeiro')" id="btn-financeiro" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-hand-holding-dollar mr-3 text-green-400"></i> Financeiro</button>
                <button onclick="showTab('clientes')" id="btn-clientes" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-users mr-3"></i> Clientes</button>
                <button onclick="showTab('estoque')" id="btn-estoque" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-boxes mr-3"></i> Estoque</button>
            </nav>
            <div class="p-4 border-t border-white/10"><button onclick="location.reload()" class="w-full flex items-center p-4 rounded-2xl text-sm text-red-400 hover:bg-red-500/10 transition"><i class="fas fa-sign-out-alt mr-3"></i> Sair</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden m-4 ml-2">
            <header class="glass p-5 px-8 flex justify-between items-center mb-4">
                <h1 id="tab-title" class="text-lg font-black uppercase tracking-widest text-blue-400">Dashboard</h1>
                <div class="text-[9px] font-bold text-green-400 uppercase tracking-widest"><i class="fas fa-check-circle mr-2"></i> Sistema Ativo</div>
            </header>

            <div class="overflow-y-auto h-full pr-2 space-y-6">
                <section id="tab-dashboard" class="tab-content">
                    <div class="grid grid-cols-3 gap-6 mb-6 text-center">
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Vendas Acumuladas</p><h2 class="text-2xl font-black" id="dash-vendas-total">R$ 0,00</h2></div>
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Clientes</p><h2 class="text-2xl font-black" id="dash-clientes-count">0</h2></div>
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Produtos</p><h2 class="text-2xl font-black" id="dash-estoque-count">0</h2></div>
                    </div>
                </section>

                <section id="tab-financeiro" class="tab-content hidden glass p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold uppercase tracking-tighter">Relatório Financeiro</h2>
                        <div class="bg-green-500/20 text-green-400 px-4 py-2 rounded-xl font-black text-xl">Total: <span id="fin-total-geral">R$ 0,00</span></div>
                    </div>
                    <table class="w-full text-left text-xs">
                        <thead><tr class="opacity-40 uppercase border-b border-white/10"><th class="pb-4">Data</th><th class="pb-4">Cliente</th><th class="pb-4 text-right">Valor</th><th class="pb-4 text-right">Ação</th></tr></thead>
                        <tbody id="corpoFinanceiro"></tbody>
                    </table>
                </section>

                <section id="tab-pdv" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass p-8 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] opacity-50 mb-2 block uppercase">Cliente</label><div class="flex gap-2"><select id="pdvCliente" class="flex-1 p-4 rounded-xl outline-none text-xs font-bold"></select><button onclick="showTab('clientes')" class="bg-blue-600 px-4 rounded-xl">+</button></div></div>
                            <div><label class="text-[10px] opacity-50 mb-2 block uppercase">Produto</label><select id="pdvSelect" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                        </div>
                        <div class="flex gap-4 items-end">
                            <div class="w-24"><label class="text-[10px] opacity-50 mb-2 block uppercase">Qtd</label><input type="number" id="pdvQtd" value="1" min="1" class="w-full p-4 rounded-xl text-center font-bold"></div>
                            <button onclick="handleAdicionarAoCarrinho()" class="flex-1 bg-blue-600 py-4 font-black uppercase text-xs rounded-xl">Adicionar Item</button>
                        </div>
                        <table class="w-full text-xs mt-4"><thead><tr class="opacity-30 text-left border-b border-white/10"><th class="pb-2">Item</th><th class="pb-2 text-center">Qtd</th><th class="pb-2 text-right">Subtotal</th><th></th></tr></thead><tbody id="carrinhoItens"></tbody></table>
                    </div>
                    <div class="glass p-8 flex flex-col justify-between bg-blue-600/10 border-l-4 border-blue-500">
                        <div>
                            <p class="text-[10px] uppercase font-bold opacity-50 mb-2">Total</p>
                            <h2 class="text-5xl font-black mb-4">R$ <span id="pdvTotal">0,00</span></h2>
                            <label class="text-[10px] opacity-50 mb-2 block uppercase">Forma de Pagamento</label>
                            <select id="pdvPagamento" class="w-full p-4 rounded-xl outline-none text-xs font-bold mb-6">
                                <option value="Pix">Pix</option>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Cartão">Cartão</option>
                            </select>
                        </div>
                        <div class="space-y-3">
                            <button onclick="handleFinalizarVenda()" class="w-full bg-green-500 py-6 rounded-3xl font-black text-xl uppercase shadow-lg">Finalizar</button>
                            <button onclick="imprimirOrcamento()" class="w-full bg-yellow-600 py-4 rounded-2xl font-bold uppercase text-[10px]">Orçamento</button>
                            <button onclick="imprimirUltimaVenda()" class="w-full bg-white/10 py-4 rounded-2xl font-bold uppercase text-[10px]"><i class="fas fa-print mr-2"></i> Re-imprimir</button>
                        </div>
                    </div>
                </section>

                <section id="tab-estoque" class="tab-content hidden glass p-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <input type="hidden" id="editProdId"><input type="text" id="estNome" placeholder="Produto" class="p-4 rounded-xl"><input type="number" id="estQtd" placeholder="Qtd" class="p-4 rounded-xl">
                        <input type="number" id="estPreco" placeholder="Preço" class="p-4 rounded-xl"><input type="text" id="estNcm" placeholder="NCM" class="p-4 rounded-xl"><input type="number" id="estIpi" placeholder="IPI %" class="p-4 rounded-xl">
                        <button onclick="handleSalvarProduto()" id="btnSalvarProd" class="bg-blue-600 font-bold rounded-xl uppercase text-xs p-4">Salvar</button>
                    </div>
                    <table class="w-full text-left text-xs"><tbody id="corpoEstoque"></tbody></table>
                </section>

                <section id="tab-clientes" class="tab-content hidden glass p-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="hidden" id="editCliId"><input type="text" id="cliNome" placeholder="Nome" class="p-4 rounded-xl"><input type="text" id="cliWhats" placeholder="WhatsApp" class="p-4 rounded-xl">
                        <input type="text" id="cliCpf" placeholder="CPF/CNPJ" class="p-4 rounded-xl"><input type="text" id="cliEndereco" placeholder="Endereço" class="p-4 rounded-xl">
                        <button onclick="handleSalvarCliente()" id="btnSalvarCli" class="md:col-span-2 bg-green-600 font-bold rounded-xl uppercase text-xs p-4">Salvar Cliente</button>
                    </div>
                    <table class="w-full text-left text-xs"><tbody id="corpoClientes"></tbody></table>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBBeL1Lbq71SfKoZQ4G26aZFPsiS5IFL9I", authDomain: "sistema-plac.firebaseapp.com", projectId: "sistema-plac", storageBucket: "sistema-plac.firebasestorage.app", messagingSenderId: "54513790116", appId: "1:54513790116:web:77d0722e5a8b8b10dfca31" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let produtos = [], clientes = [], vendas = [], carrinho = [];

        window.tentarLogin = () => { if(document.getElementById('passInput').value === "123456") { document.getElementById('login-screen').style.display='none'; document.getElementById('app-content').style.display='flex'; carregarDadosIniciais(); window.showTab('dashboard'); } else { alert("Senha incorreta!"); } };

        async function carregarDadosIniciais() { 
            const pSnap = await getDocs(collection(db, "produtos")); produtos = pSnap.docs.map(d => ({ id: d.id, ...d.data() })); 
            const cSnap = await getDocs(collection(db, "clientes")); clientes = cSnap.docs.map(d => ({ id: d.id, ...d.data() })); 
            const vSnap = await getDocs(query(collection(db, "vendas"), orderBy("data", "desc"))); vendas = vSnap.docs.map(d => ({ id: d.id, ...d.data() })); 
            renderTudo(); 
        }

        window.showTab = (tabId) => { 
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden')); 
            document.getElementById('tab-' + tabId).classList.remove('hidden'); 
            document.getElementById('tab-title').innerText = tabId.toUpperCase(); 
            if(tabId === 'financeiro') renderFinanceiro(); 
        };

        function imprimirCupom(v, t) {
            document.getElementById('print-content').innerHTML = `<div style="text-align:center;font-weight:bold;margin-bottom:10px;">${t}</div><p>Data: ${new Date(v.data).toLocaleString()}</p><p>Cliente: ${v.cliente}</p><p>Pgto: ${v.pagamento||'--'}</p><table style="width:100%;font-size:11px;margin-top:10px;border-top:1px dashed #000;">${v.itens.map(i => `<tr><td>${i.nome}</td><td>${i.qtdVenda}x</td><td style="text-align:right">R$ ${i.subtotal.toFixed(2)}</td></tr>`).join('')}</table><h2 style="text-align:right;border-top:1px solid #000;margin-top:5px;">TOTAL: R$ ${v.total.toFixed(2)}</h2>`;
            window.print();
        }

        window.imprimirUltimaVenda = () => { if(vendas.length > 0) imprimirCupom(vendas[0], "RE-IMPRESSÃO DE VENDA"); };
        window.imprimirOrcamento = () => { if(carrinho.length > 0) imprimirCupom({ cliente: document.getElementById('pdvCliente').value, total: carrinho.reduce((a,b)=>a+b.subtotal,0), itens: carrinho, data: new Date().toISOString() }, "ORÇAMENTO"); };

        window.handleAdicionarAoCarrinho = () => { const p = produtos.find(i => i.id === document.getElementById('pdvSelect').value); const q = parseInt(document.getElementById('pdvQtd').value); if(p && p.qtd >= q) { carrinho.push({...p, qtdVenda: q, subtotal: p.preco * q}); renderCarrinho(); } else alert("Estoque baixo!"); };
        window.renderCarrinho = () => { let t = 0; document.getElementById('carrinhoItens').innerHTML = carrinho.map((c, i) => { t += c.subtotal; return `<tr class="border-b border-white/5"><td class="py-4 font-bold text-[10px] uppercase">${c.nome}</td><td class="text-center">${c.qtdVenda}x</td><td class="text-right">R$ ${c.subtotal.toFixed(2)}</td><td class="text-right" onclick="carrinho.splice(${i},1);renderCarrinho()"><i class="fas fa-times text-red-400 cursor-pointer"></i></td></tr>`; }).join(''); document.getElementById('pdvTotal').innerText = t.toFixed(2).replace('.', ','); };
        
        window.handleFinalizarVenda = async () => {
            if(carrinho.length === 0) return;
            const v = { cliente: document.getElementById('pdvCliente').value, total: carrinho.reduce((a,b)=>a+b.subtotal,0), pagamento: document.getElementById('pdvPagamento').value, itens: carrinho, data: new Date().toISOString() };
            await addDoc(collection(db, "vendas"), v);
            for(let i of carrinho) await updateDoc(doc(db, "produtos", i.id), { qtd: i.qtd - i.qtdVenda });
            imprimirCupom(v, "COMPROVANTE DE VENDA");
            carrinho = []; carregarDadosIniciais();
        };

        window.estornarVenda = async (id) => {
            if(!confirm("Cancelar venda e devolver estoque?")) return;
            const v = vendas.find(x => x.id === id);
            for(let i of v.itens) { const p = produtos.find(prod => prod.id === i.id); if(p) await updateDoc(doc(db, "produtos", i.id), { qtd: p.qtd + i.qtdVenda }); }
            await deleteDoc(doc(db, "vendas", id)); carregarDadosIniciais();
        };

        window.prepararEdicaoProd = (id) => {
            const p = produtos.find(x => x.id === id);
            document.getElementById('editProdId').value = p.id; document.getElementById('estNome').value = p.nome; document.getElementById('estQtd').value = p.qtd;
            document.getElementById('estPreco').value = p.preco; document.getElementById('estNcm').value = p.ncm || ""; document.getElementById('estIpi').value = p.ipi || "";
            document.getElementById('btnSalvarProd').innerText = "Atualizar";
        };

        window.prepararEdicaoCli = (id) => {
            const c = clientes.find(x => x.id === id);
            document.getElementById('editCliId').value = c.id; document.getElementById('cliNome').value = c.nome; document.getElementById('cliWhats').value = c.whats;
            document.getElementById('cliCpf').value = c.cpf || ""; document.getElementById('cliEndereco').value = c.endereco || "";
            document.getElementById('btnSalvarCli').innerText = "Atualizar Cliente";
        };

        window.handleSalvarProduto = async () => {
            const id = document.getElementById('editProdId').value;
            const d = { nome: document.getElementById('estNome').value, qtd: parseInt(document.getElementById('estQtd').value)||0, preco: parseFloat(document.getElementById('estPreco').value)||0, ncm: document.getElementById('estNcm').value, ipi: document.getElementById('estIpi').value };
            id ? await updateDoc(doc(db, "produtos", id), d) : await addDoc(collection(db, "produtos"), d);
            limparForms(); carregarDadosIniciais();
        };

        window.handleSalvarCliente = async () => {
            const id = document.getElementById('editCliId').value;
            const d = { nome: document.getElementById('cliNome').value, whats: document.getElementById('cliWhats').value, cpf: document.getElementById('cliCpf').value, endereco: document.getElementById('cliEndereco').value };
            id ? await updateDoc(doc(db, "clientes", id), d) : await addDoc(collection(db, "clientes"), d);
            limparForms(); carregarDadosIniciais();
        };

        window.handleDeletar = async (col, id) => { if(confirm("Excluir?")) { await deleteDoc(doc(db, col, id)); carregarDadosIniciais(); } };

        function renderTudo() {
            document.getElementById('corpoEstoque').innerHTML = produtos.map(p => `<tr class="border-b border-white/5"><td class="py-4 uppercase font-bold text-blue-300">${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.preco.toFixed(2)}</td><td class="text-right flex gap-3 justify-end"><button onclick="prepararEdicaoProd('${p.id}')"><i class="fas fa-edit text-blue-400"></i></button><button onclick="handleDeletar('produtos', '${p.id}')"><i class="fas fa-trash text-red-500 opacity-30"></i></button></td></tr>`).join('');
            document.getElementById('corpoClientes').innerHTML = clientes.map(c => `<tr class="border-b border-white/5"><td class="py-4 uppercase font-bold">${c.nome}</td><td>${c.whats}</td><td class="text-right flex gap-3 justify-end"><button onclick="prepararEdicaoCli('${c.id}')"><i class="fas fa-edit text-blue-400"></i></button><button onclick="handleDeletar('clientes', '${c.id}')"><i class="fas fa-trash text-red-500 opacity-30"></i></button></td></tr>`).join('');
            document.getElementById('corpoFinanceiro').innerHTML = vendas.map(v => `<tr class="border-b border-white/5"><td class="py-4">${new Date(v.data).toLocaleDateString()}</td><td class="font-bold uppercase">${v.cliente}</td><td class="text-right">R$ ${v.total.toFixed(2)}</td><td class="text-right"><button onclick="estornarVenda('${v.id}')"><i class="fas fa-trash-alt text-red-500"></i></button></td></tr>`).join('');
            document.getElementById('pdvCliente').innerHTML = clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('pdvSelect').innerHTML = produtos.map(p => `<option value="${p.id}">${p.nome} (${p.qtd})</option>`).join('');
            document.getElementById('dash-vendas-total').innerText = "R$ " + vendas.reduce((a,b)=>a+b.total,0).toFixed(2).replace('.', ',');
            document.getElementById('dash-estoque-count').innerText = produtos.length; document.getElementById('dash-clientes-count').innerText = clientes.length;
        }

        function limparForms() { document.querySelectorAll('input').forEach(i => i.value = ''); document.getElementById('editProdId').value = ""; document.getElementById('editCliId').value = ""; document.getElementById('btnSalvarProd').innerText = "Salvar"; document.getElementById('btnSalvarCli').innerText = "Salvar Cliente"; }
    </script>
</body>
</html>
