<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAC Drywall - Gestão Nuvem</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plac-blue: #0d1b3e; }
        body { background: linear-gradient(135deg, #0d1b3e 0%, #1e293b 100%); background-attachment: fixed; min-height: 100vh; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .active-tab { background: rgba(59, 130, 246, 0.2) !important; border-left: 4px solid #3b82f6; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0d1b3e; }
        .logo-img { max-width: 180px; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }

        /* ESTILO PARA IMPRESSÃO (Oculto na tela) */
        #print-area { display: none; color: black !important; background: white !important; font-family: 'Courier New', Courier, monospace; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; border: none; }
            .no-print { display: none !important; }
        }
        .print-header-img { width: 100%; max-width: 800px; margin: 0 auto 15px auto; display: block; }
        .print-address { text-align: center; font-size: 10px; line-height: 1.4; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="print-area">
        <img src="WhatsApp Image 2026-03-23 at 22.46.19.jpeg" alt="PLAC Drywall" class="print-header-img no-print">
        <div class="print-address">
            <span class="font-black text-sm">PLAC DRYWALL</span><br>
            <span class="font-bold">Endereço:</span> Rua Neuza Francisca dos Santos, 434<br>
            Jardim Recanto dos Sonhos, Sumaré - SP<br>
            <span class="font-bold">Tel:</span> (19) 98814-7888
        </div>
        <div id="print-content" class="p-4 text-xs">
            </div>
    </div>

    <div id="login-screen">
        <div class="glass p-10 w-96 text-center shadow-2xl bg-white/5">
            <div class="mb-8"><img src="logo.png" alt="PLAC Drywall" class="logo-img"></div>
            <input type="password" id="passInput" placeholder="Senha" class="w-full p-4 rounded-2xl mb-4 text-center font-bold outline-none border border-white/10">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs hover:bg-blue-500 transition shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="app-content" class="h-screen flex" style="display: none;">
        <aside class="w-64 glass m-4 mr-2 flex flex-col no-print">
            <div class="p-6 border-b border-white/10 mb-4 text-center"><img src="logo.png" alt="Logo" class="w-32 mx-auto"></div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="w-full flex items-center p-4 rounded-2xl text-sm active-tab"><i class="fas fa-chart-pie mr-3 text-blue-400"></i> Dashboard</button>
                <button onclick="showTab('pdv')" id="btn-pdv" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-shopping-cart mr-3"></i> Vendas</button>
                <button onclick="showTab('financeiro')" id="btn-financeiro" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-hand-holding-dollar mr-3 text-green-400"></i> Financeiro</button>
                <button onclick="showTab('clientes')" id="btn-clientes" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-users mr-3"></i> Clientes</button>
                <button onclick="showTab('estoque')" id="btn-estoque" class="w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-boxes mr-3"></i> Estoque</button>
            </nav>
            <div class="p-4 border-t border-white/10"><button onclick="location.reload()" class="w-full flex items-center p-4 rounded-2xl text-sm text-red-400 hover:bg-red-500/10 transition"><i class="fas fa-sign-out-alt mr-3"></i> Sair</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden m-4 ml-2 no-print">
            <header class="glass p-5 px-8 flex justify-between items-center mb-4">
                <h1 id="tab-title" class="text-lg font-black uppercase tracking-widest text-blue-400">Dashboard</h1>
                <div class="text-[9px] font-bold text-green-400 uppercase tracking-widest"><i class="fas fa-check-circle mr-2"></i> Sistema Ativo</div>
            </header>

            <div class="overflow-y-auto h-full pr-2 space-y-6">
                <section id="tab-dashboard" class="tab-content">
                    <div class="grid grid-cols-3 gap-6 mb-6 text-center">
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Vendas Hoje</p><h2 class="text-2xl font-black" id="dash-vendas-total">R$ 0,00</h2></div>
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Clientes</p><h2 class="text-2xl font-black" id="dash-clientes-count">0</h2></div>
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Produtos</p><h2 class="text-2xl font-black" id="dash-estoque-count">0</h2></div>
                    </div>
                </section>

                <section id="tab-financeiro" class="tab-content hidden glass p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold uppercase tracking-tighter">Relatório de Vendas</h2>
                        <div class="flex items-center gap-3">
                            <button onclick="imprimirFinanceiro()" class="bg-white/10 text-xs px-4 py-2 rounded-xl font-bold uppercase hover:bg-white/20"><i class="fas fa-print mr-2"></i> Imprimir</button>
                            <div class="bg-green-500/20 text-green-400 px-4 py-2 rounded-xl font-black text-xl">Total: <span id="fin-total-geral">R$ 0,00</span></div>
                        </div>
                    </div>
                    <div class="glass p-6 mb-6 h-64">
                        <canvas id="financeiroChart"></canvas>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead><tr class="opacity-40 uppercase border-b border-white/10"><th class="pb-4">Data/Hora</th><th class="pb-4">Cliente</th><th class="pb-4 text-right">Valor</th></tr></thead>
                            <tbody id="corpoFinanceiro"></tbody>
                        </table>
                    </div>
                </section>

                <section id="tab-pdv" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass p-8 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] opacity-50 mb-2 block uppercase">Cliente</label><select id="pdvCliente" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                            <div><label class="text-[10px] opacity-50 mb-2 block uppercase">Produto</label><select id="pdvSelect" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                        </div>
                        <div class="flex gap-4 items-end">
                            <div class="w-24"><label class="text-[10px] opacity-50 mb-2 block uppercase">Qtd</label><input type="number" id="pdvQtd" value="1" min="1" class="w-full p-4 rounded-xl text-center font-bold"></div>
                            <button onclick="handleAdicionarAoCarrinho()" class="flex-1 bg-blue-600 py-4 font-black uppercase text-xs rounded-xl shadow-lg">Adicionar Item</button>
                        </div>
                        <table class="w-full text-xs mt-4"><thead><tr class="opacity-30 text-left border-b border-white/10"><th class="pb-2">Item</th><th class="pb-2 text-center">Qtd</th><th class="pb-2 text-right">Subtotal</th><th></th></tr></thead><tbody id="carrinhoItens"></tbody></table>
                    </div>
                    <div class="glass p-8 flex flex-col justify-between bg-blue-600/10 border-l-4 border-blue-500">
                        <div><p class="text-[10px] uppercase font-bold opacity-50 mb-2">Total a Pagar</p><h2 class="text-5xl font-black">R$ <span id="pdvTotal">0,00</span></h2></div>
                        <div class="space-y-3">
                            <button onclick="handleFinalizarVenda()" class="w-full bg-green-500 py-6 rounded-3xl font-black text-xl uppercase shadow-lg hover:bg-green-400 transition">Finalizar Venda</button>
                            <button onclick="imprimirCupomAtual()" class="w-full bg-white/10 py-4 rounded-2xl font-bold uppercase text-[10px] hover:bg-white/20 transition"><i class="fas fa-print mr-2"></i> Imprimir Cupom</button>
                        </div>
                    </div>
                </section>

                <section id="tab-estoque" class="tab-content hidden glass p-8">
                    </section>

                <section id="tab-clientes" class="tab-content hidden glass p-8">
                    </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Config Firebase (Código Intacto)
        const firebaseConfig = { apiKey: "AIzaSyBBeL1Lbq71SfKoZQ4G26aZFPsiS5IFL9I", authDomain: "sistema-plac.firebaseapp.com", projectId: "sistema-plac", storageBucket: "sistema-plac.firebasestorage.app", messagingSenderId: "54513790116", appId: "1:54513790116:web:77d0722e5a8b8b10dfca31" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let produtos = [], clientes = [], vendas = [], carrinho = [], finChart;

        // Login Blindado (Intacto)
        window.tentarLogin = () => { if(document.getElementById('passInput').value === "123456") { document.getElementById('login-screen').setAttribute('style', 'display:none !important'); document.getElementById('app-content').setAttribute('style', 'display:flex !important'); carregarDadosIniciais(); window.showTab('dashboard'); } else { alert("Senha incorreta!"); } };

        async function carregarDadosIniciais() { const pSnap = await getDocs(collection(db, "produtos")); produtos = pSnap.docs.map(d => ({ id: d.id, ...d.data() })); const cSnap = await getDocs(collection(db, "clientes")); clientes = cSnap.docs.map(d => ({ id: d.id, ...d.data() })); const vSnap = await getDocs(query(collection(db, "vendas"), orderBy("data", "desc"))); vendas = vSnap.docs.map(d => ({ id: d.id, ...d.data() })); renderTudo(); }

        window.showTab = (tabId) => { document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden')); document.getElementById('tab-' + tabId).classList.remove('hidden'); document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active-tab')); const btn = document.getElementById('btn-' + tabId); if(btn) btn.classList.add('active-tab'); document.getElementById('tab-title').innerText = tabId.toUpperCase(); if(tabId === 'financeiro') renderFinanceiro(); };

        // --- NOVA LÓGICA DE IMPRESSÃO ---

        // Função para imprimir o cupom da venda que está no carrinho agora
        window.imprimirCupomAtual = () => {
            if(carrinho.length === 0) return alert("Carrinho vazio!");
            const clienteNome = document.getElementById('pdvCliente').value;
            const total = document.getElementById('pdvTotal').innerText;
            const dataStr = new Date().toLocaleString('pt-BR');

            const content = `
                <div class="text-center font-bold text-sm mb-4">CUPOM DE VENDA</div>
                <div class="mb-2"><strong>Data:</strong> ${dataStr}</div>
                <div class="mb-4"><strong>Cliente:</strong> ${clienteNome}</div>
                <table class="w-full text-xs mb-4" style="border-collapse: collapse;">
                    <thead><tr style="border-bottom: 1px solid black;"><th class="text-left pb-1">Item</th><th class="text-center pb-1">Qtd</th><th class="text-right pb-1">Sub</th></tr></thead>
                    <tbody>
                        ${carrinho.map(item => `
                            <tr><td class="pt-1 uppercase">${item.nome}</td><td class="text-center pt-1">${item.qtdVenda}x</td><td class="text-right pt-1">R$ ${item.subtotal.toFixed(2)}</td></tr>
                        `).join('')}
                    </tbody>
                </table>
                <div class="text-right font-black text-lg border-t-2 border-black pt-2">TOTAL: R$ ${total}</div>
                <div class="text-center mt-6 text-[10px] opacity-70">Obrigado pela preferência!<br>Plac Drywall - Soluções em Gesso</div>
            `;
            
            document.getElementById('print-content').innerHTML = content;
            window.print(); // Abre o diálogo de impressão do navegador
        };

        // Função para imprimir a lista de vendas do financeiro
        window.imprimirFinanceiro = () => {
            const total = document.getElementById('fin-total-geral text-xl').innerText;
            const dataStr = new Date().toLocaleDateString('pt-BR');

            const content = `
                <div class="text-center font-bold text-sm mb-4">RELATÓRIO FINANCEIRO - VENDAS</div>
                <div class="mb-4"><strong>Data de Emissão:</strong> ${dataStr}</div>
                <table class="w-full text-xs mb-4" style="border-collapse: collapse;">
                    <thead><tr style="border-bottom: 1px solid black;"><th class="text-left pb-1">Data/Hora</th><th class="text-left pb-1">Cliente</th><th class="text-right pb-1">Valor</th></tr></thead>
                    <tbody>
                        ${vendas.map(v => `
                            <tr><td class="pt-1">${new Date(v.data).toLocaleString('pt-BR')}</td><td class="pt-1 uppercase">${v.cliente}</td><td class="text-right pt-1 font-bold">R$ ${v.total.toFixed(2)}</td></tr>
                        `).join('')}
                    </tbody>
                </table>
                <div class="text-right font-black text-lg border-t-2 border-black pt-2">TOTAL BRUTO: ${total}</div>
            `;

            document.getElementById('print-content').innerHTML = content;
            window.print();
        };

        // --- LÓGICA FINANCEIRA (Ajuste leve para o novo botão) ---
        window.renderFinanceiro = () => {
            let totalGeral = 0; const corpo = document.getElementById('corpoFinanceiro'); corpo.innerHTML = vendas.map(v => { totalGeral += v.total; const data = new Date(v.data).toLocaleString('pt-BR'); return `<tr class="border-b border-white/5 hover:bg-white/5"><td class="py-4 opacity-70">${data}</td><td class="font-bold uppercase">${v.cliente}</td><td class="text-right font-black text-green-400">R$ ${v.total.toFixed(2)}</td></tr>`; }).join(''); document.getElementById('fin-total-geral').innerText = "R$ " + totalGeral.toFixed(2).replace('.', ','); const ctx = document.getElementById('financeiroChart').getContext('2d'); if(finChart) finChart.destroy(); finChart = new Chart(ctx, { type: 'line', data: { labels: vendas.slice(0,7).reverse().map(v => new Date(v.data).toLocaleDateString()), datasets: [{ label: 'Vendas (R$)', data: vendas.slice(0,7).reverse().map(v => v.total), borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } } });
        };

        // --- RESTANTE DO CÓDIGO PDV, ESTOQUE, CLIENTES (Intacto) ---
        // (O código abaixo foi mantido exatamente igual à versão anterior para garantir o funcionamento)
        window.handleAdicionarAoCarrinho = () => { const p = produtos.find(item => item.id === document.getElementById('pdvSelect').value); const qtd = parseInt(document.getElementById('pdvQtd').value); if(p && p.qtd >= qtd) { carrinho.push({...p, qtdVenda: qtd, subtotal: p.preco * qtd}); renderCarrinho(); } else { alert("Estoque insuficiente!"); } };
        window.renderCarrinho = () => { let total = 0; document.getElementById('carrinhoItens').innerHTML = carrinho.map((c, i) => { total += c.subtotal; return `<tr class="border-b border-white/5"><td class="py-4 uppercase font-bold text-[10px]">${c.nome}</td><td class="text-center">${c.qtdVenda}x</td><td class="text-right font-black">R$ ${c.subtotal.toFixed(2)}</td><td class="text-right" onclick="carrinho.splice(${i},1);renderCarrinho()"><i class="fas fa-times text-red-400 cursor-pointer"></i></td></tr>`; }).join(''); document.getElementById('pdvTotal').innerText = total.toFixed(2).replace('.', ','); };
        window.handleFinalizarVenda = async () => { if(carrinho.length === 0) return alert("Carrinho vazio!"); const venda = { cliente: document.getElementById('pdvCliente').value, total: carrinho.reduce((a,b) => a+b.subtotal,0), data: new Date().toISOString() }; await addDoc(collection(db, "vendas"), venda); for(let item of carrinho) { await updateDoc(doc(db, "produtos", item.id), { qtd: item.qtd - item.qtdVenda }); } carrinho = []; carregarDadosIniciais(); alert("Venda Finalizada!"); };
        window.handleSalvarProduto = async () => { const id = document.getElementById('editProdId').value; const dados = { nome: document.getElementById('estNome').value, qtd: parseInt(document.getElementById('estQtd').value) || 0, preco: parseFloat(document.getElementById('estPreco').value) || 0, ncm: document.getElementById('estNcm').value || "", ipi: document.getElementById('estIpi').value || "" }; id ? await updateDoc(doc(db, "produtos", id), dados) : await addDoc(collection(db, "produtos"), dados); carregarDadosIniciais(); limparForms(); };
        window.handleSalvarCliente = async () => { const id = document.getElementById('editCliId').value; const dados = { nome: document.getElementById('cliNome').value, whats: document.getElementById('cliWhats').value }; id ? await updateDoc(doc(db, "clientes", id), dados) : await addDoc(collection(db, "clientes"), dados); carregarDadosIniciais(); limparForms(); };
        window.prepararEdicaoProd = (id) => { const p = produtos.find(x => x.id === id); document.getElementById('editProdId').value = p.id; document.getElementById('estNome').value = p.nome; document.getElementById('estQtd').value = p.qtd; document.getElementById('estPreco').value = p.preco; document.getElementById('estNcm').value = p.ncm || ''; document.getElementById('estIpi').value = p.ipi || ''; document.getElementById('btnSalvarProd').innerText = "Atualizar"; };
        window.handleDeletar = async (col, id) => { if(confirm("Excluir?")) { await deleteDoc(doc(db, col, id)); carregarDadosIniciais(); } };
        function renderTudo() { document.getElementById('corpoEstoque').innerHTML = produtos.map(p => `<tr class="border-b border-white/5"><td class="p-4 cursor-pointer" onclick="prepararEdicaoProd('${p.id}')"><span class="font-bold text-xs uppercase">${p.nome}</span><br><span class="text-[9px] text-blue-400">NCM: ${p.ncm || '--'} | IPI: ${p.ipi || '0'}%</span></td><td class="p-4">${p.qtd} UN</td><td class="p-4 font-black">R$ ${p.preco.toFixed(2)}</td><td class="p-4 text-right"><button onclick="handleDeletar('produtos', '${p.id}')" class="text-red-400"><i class="fas fa-trash"></i></button></td></tr>`).join(''); document.getElementById('corpoClientes').innerHTML = clientes.map(c => `<tr class="border-b border-white/5"><td class="p-4 uppercase text-xs font-bold">${c.nome}</td><td class="p-4 text-blue-300 font-bold">${c.whats}</td><td class="p-4 text-right flex justify-end gap-2"><button onclick="window.open('https://wa.me/${c.whats.replace(/\D/g, '')}', '_blank')" class="text-green-400"><i class="fab fa-whatsapp"></i></button><button onclick="handleDeletar('clientes', '${c.id}')" class="text-red-400"><i class="fas fa-trash"></i></button></td></tr>`).join(''); document.getElementById('pdvCliente').innerHTML = clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join(''); document.getElementById('pdvSelect').innerHTML = produtos.map(p => `<option value="${p.id}">${p.nome} (${p.qtd})</option>`).join(''); const totalVendas = vendas.reduce((a,b) => a+b.total,0); document.getElementById('dash-vendas-total').innerText = "R$ " + totalVendas.toFixed(2).replace('.', ','); document.getElementById('dash-estoque-count').innerText = produtos.length; document.getElementById('dash-clientes-count').innerText = clientes.length; }
        function limparForms() { document.querySelectorAll('input').forEach(i => i.value = ''); document.getElementById('btnSalvarProd').innerText = "Salvar"; }
    </script>
</body>
</html>
