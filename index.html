<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAC Drywall - Gestão Nuvem</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plac-blue: #0d1b3e; }
        body { background: linear-gradient(135deg, #0d1b3e 0%, #1e293b 100%); background-attachment: fixed; min-height: 100vh; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .active-tab { background: rgba(59, 130, 246, 0.2) !important; border-left: 4px solid #3b82f6; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        /* Força a tela de login a ficar por cima de tudo até o acesso */
        #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0d1b3e; }
        .logo-img { max-width: 180px; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glass p-10 w-96 text-center shadow-2xl bg-white/5">
            <div class="mb-8"><img src="logo.png" alt="PLAC Drywall" class="logo-img"></div>
            <input type="password" id="passInput" placeholder="Senha" class="w-full p-4 rounded-2xl mb-4 text-center font-bold outline-none border border-white/10">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs hover:bg-blue-500 transition shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="app-content" style="display: none;" class="h-screen flex">
        <aside class="w-64 glass m-4 mr-2 flex flex-col">
            <div class="p-6 border-b border-white/10 mb-4 text-center"><img src="logo.png" alt="Logo" class="w-32 mx-auto"></div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm active-tab"><i class="fas fa-chart-pie mr-3 text-blue-400"></i> Dashboard</button>
                <button onclick="showTab('pdv')" id="btn-pdv" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-shopping-cart mr-3"></i> Vendas</button>
                <button onclick="showTab('clientes')" id="btn-clientes" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-users mr-3"></i> Clientes</button>
                <button onclick="showTab('estoque')" id="btn-estoque" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-boxes mr-3"></i> Estoque</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden m-4 ml-2">
            <header class="glass p-5 px-8 flex justify-between items-center mb-4">
                <h1 id="tab-title" class="text-lg font-black uppercase tracking-widest text-blue-400">Dashboard</h1>
                <div id="status-cloud" class="text-[9px] font-bold text-yellow-400 uppercase tracking-widest">Sincronizado</div>
            </header>

            <div class="overflow-y-auto h-full pr-2">
                <section id="tab-dashboard" class="tab-content">
                    <div class="grid grid-cols-3 gap-6 mb-6 text-center">
                        <div class="glass p-8"><p class="text-[10px] opacity-50">Vendas</p><h2 id="dash-vendas-total" class="text-2xl font-black">R$ 0,00</h2></div>
                        <div class="glass p-8"><p class="text-[10px] opacity-50">Clientes</p><h2 id="dash-clientes-count" class="text-2xl font-black">0</h2></div>
                        <div class="glass p-8"><p class="text-[10px] opacity-50">Produtos</p><h2 id="dash-estoque-count" class="text-2xl font-black">0</h2></div>
                    </div>
                </section>

                <section id="tab-estoque" class="tab-content hidden glass p-8">
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                        <input type="hidden" id="editProdId">
                        <input type="text" id="estNome" placeholder="Produto" class="p-4 rounded-xl">
                        <input type="number" id="estQtd" placeholder="Qtd" class="p-4 rounded-xl">
                        <input type="number" id="estPreco" placeholder="Preço" class="p-4 rounded-xl">
                        <input type="text" id="estNcm" placeholder="NCM" class="p-4 rounded-xl border-blue-500/20">
                        <input type="number" id="estIpi" placeholder="IPI %" class="p-4 rounded-xl border-blue-500/20">
                        <button onclick="handleSalvarProduto()" id="btnSalvarProd" class="bg-blue-600 font-bold rounded-xl">Salvar</button>
                    </div>
                    <table class="w-full text-left">
                        <tbody id="corpoEstoque"></tbody>
                    </table>
                </section>
                
                <section id="tab-pdv" class="tab-content hidden glass p-8">
                    <div class="flex flex-col gap-4">
                        <button onclick="alert('Funcionalidade de Nota Fiscal: Dados de NCM/IPI integrados.')" class="bg-white/10 p-4 rounded-xl font-bold text-xs uppercase"><i class="fas fa-file-invoice mr-2"></i> Preparar Nota Fiscal (NF-e)</button>
                        </div>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBeL1Lbq71SfKoZQ4G26aZFPsiS5IFL9I",
            authDomain: "sistema-plac.firebaseapp.com",
            projectId: "sistema-plac",
            storageBucket: "sistema-plac.firebasestorage.app",
            messagingSenderId: "54513790116",
            appId: "1:54513790116:web:77d0722e5a8b8b10dfca31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let produtos = [], clientes = [], vendas = [];

        // FUNÇÃO DE LOGIN - RESOLVENDO O TRAVAMENTO
        window.tentarLogin = async () => {
            const senha = document.getElementById('passInput').value;
            if(senha === "123") {
                // Remove o login e mostra o app usando JS Puro (mais garantido que Tailwind)
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                
                // Carrega os dados IMEDIATAMENTE após entrar
                await carregarDadosIniciais();
                window.showTab('dashboard');
            } else {
                alert("Senha incorreta!");
            }
        };

        async function carregarDadosIniciais() {
            const pSnap = await getDocs(collection(db, "produtos"));
            produtos = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const cSnap = await getDocs(collection(db, "clientes"));
            clientes = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            renderTudo();
        }

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('tab-title').innerText = tabId.toUpperCase();
        };

        window.handleSalvarProduto = async () => {
            const id = document.getElementById('editProdId').value;
            const dados = { 
                nome: document.getElementById('estNome').value, 
                qtd: parseInt(document.getElementById('estQtd').value) || 0, 
                preco: parseFloat(document.getElementById('estPreco').value) || 0,
                ncm: document.getElementById('estNcm').value || "",
                ipi: document.getElementById('estIpi').value || ""
            };
            if(!dados.nome) return alert("Nome obrigatório");
            
            if(id) { await updateDoc(doc(db, "produtos", id), dados); } 
            else { await addDoc(collection(db, "produtos"), dados); }
            
            await carregarDadosIniciais();
            limparForms();
        };

        function renderTudo() {
            document.getElementById('corpoEstoque').innerHTML = produtos.map(p => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-bold text-xs uppercase">${p.nome}<br><span class="text-[9px] opacity-40">NCM: ${p.ncm || '--'} | IPI: ${p.ipi || '0'}%</span></td>
                    <td class="p-4">${p.qtd} UN</td>
                    <td class="p-4">R$ ${p.preco.toFixed(2)}</td>
                </tr>`).join('');
            
            document.getElementById('dash-estoque-count').innerText = produtos.length;
            document.getElementById('dash-clientes-count').innerText = clientes.length;
        }

        function limparForms() {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('editProdId').value = '';
        }
    </script>
</body>
</html>
