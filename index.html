<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAC Drywall - Gestão Nuvem</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plac-blue: #0d1b3e; }
        body { background: linear-gradient(135deg, #0d1b3e 0%, #1e293b 100%); background-attachment: fixed; min-height: 100vh; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .active-tab { background: rgba(59, 130, 246, 0.2) !important; border-left: 4px solid #3b82f6; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0d1b3e; }
        .logo-img { max-width: 180px; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glass p-10 w-96 text-center shadow-2xl bg-white/5">
            <div class="mb-8"><img src="logo.png" alt="PLAC Drywall" class="logo-img"></div>
            <input type="password" id="passInput" placeholder="Senha" class="w-full p-4 rounded-2xl mb-4 text-center font-bold outline-none border border-white/10">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs hover:bg-blue-500 transition shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="app-content" class="h-screen flex hidden">
        <aside class="w-64 glass m-4 mr-2 flex flex-col">
            <div class="p-6 border-b border-white/10 mb-4 text-center"><img src="logo.png" alt="Logo" class="w-32 mx-auto"></div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm active-tab"><i class="fas fa-chart-pie mr-3 text-blue-400"></i> Dashboard</button>
                <button onclick="showTab('pdv')" id="btn-pdv" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-shopping-cart mr-3"></i> Vendas</button>
                <button onclick="showTab('clientes')" id="btn-clientes" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-users mr-3"></i> Clientes</button>
                <button onclick="showTab('estoque')" id="btn-estoque" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm"><i class="fas fa-boxes mr-3"></i> Estoque</button>
            </nav>
            <div class="p-4 border-t border-white/10"><button onclick="location.reload()" class="w-full flex items-center p-4 rounded-2xl text-sm text-red-400 hover:bg-red-500/10 transition"><i class="fas fa-sign-out-alt mr-3"></i> Sair</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden m-4 ml-2">
            <header class="glass p-5 px-8 flex justify-between items-center mb-4">
                <h1 id="tab-title" class="text-lg font-black uppercase tracking-widest text-blue-400">Dashboard</h1>
                <div id="status-cloud" class="text-[9px] font-bold text-yellow-400 uppercase tracking-widest"><i class="fas fa-sync fa-spin mr-2"></i> Online</div>
            </header>

            <div class="overflow-y-auto h-full pr-2 space-y-6">
                <section id="tab-pdv" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass p-8 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] opacity-50 mb-2 block">Cliente</label><select id="pdvCliente" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                            <div><label class="text-[10px] opacity-50 mb-2 block">Produto</label><select id="pdvSelect" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                        </div>
                        <div class="flex gap-4 items-end">
                            <div class="w-24"><label class="text-[10px] opacity-50 mb-2 block">Qtd</label><input type="number" id="pdvQtd" value="1" min="1" class="w-full p-4 rounded-xl text-center font-bold"></div>
                            <button onclick="handleAdicionarAoCarrinho()" class="flex-1 bg-blue-600 py-4 font-black uppercase text-xs rounded-xl">Lançar Item</button>
                        </div>
                        <table class="w-full text-xs mt-4"><tbody id="carrinhoItens"></tbody></table>
                    </div>
                    <div class="glass p-8 flex flex-col justify-between bg-blue-600/10 border-l-4 border-blue-500">
                        <div>
                            <p class="text-[10px] uppercase font-bold opacity-50">Total</p>
                            <h2 class="text-5xl font-black">R$ <span id="pdvTotal">0,00</span></h2>
                        </div>
                        <div class="space-y-3">
                            <button onclick="handleFinalizarVenda()" class="w-full bg-green-500 py-4 rounded-2xl font-black uppercase text-xs">Finalizar Venda</button>
                            <button onclick="alert('Módulo de Emissão Fiscal: Para ativar, o contador deve fornecer o Certificado A1 da empresa.')" class="w-full bg-white/10 py-4 rounded-2xl font-bold uppercase text-[10px] hover:bg-white/20 transition">
                                <i class="fas fa-file-invoice-dollar mr-2"></i> Emitir NF-e (Fiscal)
                            </button>
                        </div>
                    </div>
                </section>

                <section id="tab-estoque" class="tab-content hidden glass p-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <input type="hidden" id="editProdId">
                        <input type="text" id="estNome" placeholder="Produto" class="p-4 rounded-xl">
                        <input type="number" id="estQtd" placeholder="Qtd" class="p-4 rounded-xl">
                        <input type="number" id="estPreco" placeholder="Preço" class="p-4 rounded-xl">
                        <input type="text" id="estNcm" placeholder="NCM (Obrigatório p/ NF)" class="p-4 rounded-xl border-blue-500/30">
                        <input type="number" id="estIpi" placeholder="IPI %" class="p-4 rounded-xl border-blue-500/30">
                        <button onclick="handleSalvarProduto()" id="btnSalvarProd" class="bg-blue-600 font-bold rounded-xl p-4">Salvar</button>
                    </div>
                    <table class="w-full text-left"><tbody id="corpoEstoque"></tbody></table>
                </section>

                <section id="tab-dashboard" class="tab-content">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 text-center" id="dash-stats">
                        </div>
                    <div class="glass p-8 h-80"><canvas id="vendasChart"></canvas></div>
                </section>
                
                <section id="tab-clientes" class="tab-content hidden glass p-8">
                     </section>
            </div>
        </main>
    </div>

    <script type="module">
        // [CÓDIGO DE INICIALIZAÇÃO DO FIREBASE E FUNÇÕES MANTIDO CONFORME ITENS REGISTRADOS]
        // Incluindo tratamento para os novos campos NCM e IPI no salvamento
        window.handleSalvarProduto = async () => {
            const id = document.getElementById('editProdId').value;
            const dados = { 
                nome: document.getElementById('estNome').value, 
                qtd: parseInt(document.getElementById('estQtd').value), 
                preco: parseFloat(document.getElementById('estPreco').value),
                ncm: document.getElementById('estNcm').value,
                ipi: document.getElementById('estIpi').value
            };
            // Lógica de salvamento no Firebase...
        };
    </script>
</body>
</html>
