<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAC Drywall - Gestão Nuvem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plac-blue: #0d1b3e; }
        body {
            background: linear-gradient(135deg, #0d1b3e 0%, #1e293b 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .active-tab { background: rgba(255,255,255,0.15); border-left: 4px solid #3b82f6; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        
        #login-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: #0d1b3e;
        }
        .loading-spinner { display: none; }
        .is-loading .loading-spinner { display: inline-block; }
        .is-loading .btn-text { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glass p-10 w-96 text-center shadow-2xl bg-white/5">
            <img src="logo.png" class="w-32 mx-auto mb-8" alt="PLAC" onerror="this.src='https://via.placeholder.com/150?text=PLAC+DRYWALL'">
            <h2 class="text-xl font-black uppercase mb-6">Acesso ao Sistema</h2>
            <input type="password" id="passInput" placeholder="Senha" class="w-full p-4 rounded-2xl mb-4 text-center font-bold outline-none">
            <button id="btnLogin" onclick="tentarLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs hover:bg-blue-500 transition">
                <span class="btn-text">Entrar</span>
                <i class="fas fa-spinner fa-spin loading-spinner"></i>
            </button>
        </div>
    </div>

    <div id="app-content" class="h-screen flex hidden">
        <aside class="w-64 glass m-4 mr-2 flex flex-col">
            <div class="p-6 border-b border-white/10 mb-4 text-center">
                <span class="font-black text-2xl tracking-tighter text-blue-400">PLAC</span>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="sidebar-item active-tab w-full flex items-center p-4 rounded-2xl text-sm transition"><i class="fas fa-chart-pie mr-3 text-blue-400"></i> Dashboard</button>
                <button onclick="showTab('pdv')" id="btn-pdv" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm transition"><i class="fas fa-shopping-cart mr-3"></i> Vendas</button>
                <button onclick="showTab('clientes')" id="btn-clientes" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm transition"><i class="fas fa-users mr-3"></i> Clientes</button>
                <button onclick="showTab('estoque')" id="btn-estoque" class="sidebar-item w-full flex items-center p-4 rounded-2xl text-sm transition"><i class="fas fa-boxes mr-3"></i> Estoque</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden m-4 ml-2">
            <header class="glass p-5 px-8 flex justify-between items-center mb-4">
                <h1 id="tab-title" class="text-lg font-black uppercase tracking-widest text-blue-400">Dashboard</h1>
                <div class="text-[9px] font-bold text-green-400 uppercase tracking-widest"><i class="fas fa-circle mr-2 animate-pulse"></i> Sistema Online</div>
            </header>

            <div class="overflow-y-auto h-full pr-2 space-y-6">
                <section id="tab-dashboard">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 text-center">
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Vendas Totais</p><h2 class="text-3xl font-black" id="dash-vendas-total">R$ 0,00</h2></div>
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Clientes</p><h2 class="text-3xl font-black" id="dash-clientes-count">0</h2></div>
                        <div class="glass p-8"><p class="text-[10px] uppercase opacity-50 mb-1">Estoque</p><h2 class="text-3xl font-black" id="dash-estoque-count">0</h2></div>
                    </div>
                    <div class="glass p-8 h-80"><canvas id="vendasChart"></canvas></div>
                </section>

                <section id="tab-pdv" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass p-8 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] uppercase font-bold text-blue-400 mb-2 block">1. Selecionar Cliente</label><select id="pdvCliente" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                            <div><label class="text-[10px] uppercase font-bold text-blue-400 mb-2 block">2. Selecionar Produto</label><select id="pdvSelect" class="w-full p-4 rounded-xl outline-none text-xs font-bold"></select></div>
                        </div>
                        <div class="flex gap-4 items-end">
                            <div class="w-24"><label class="text-[10px] uppercase font-bold text-blue-400 mb-2 block">Qtd</label><input type="number" id="pdvQtd" value="1" min="1" class="w-full p-4 rounded-xl text-center font-bold"></div>
                            <button onclick="handleAdicionarAoCarrinho()" class="flex-1 bg-blue-600 py-4 font-black uppercase text-xs rounded-xl"><i class="fas fa-plus mr-2"></i> Lançar Item</button>
                        </div>
                        <table class="w-full text-xs mt-4"><thead><tr class="opacity-50 text-[10px] uppercase"><th class="pb-4 text-left">Produto</th><th class="pb-4 text-center">Qtd</th><th class="pb-4 text-right">Subtotal</th><th></th></tr></thead><tbody id="carrinhoItens"></tbody></table>
                    </div>
                    <div class="glass p-8 flex flex-col justify-between bg-blue-600/10 border-l-4 border-blue-500">
                        <div><p class="text-[10px] uppercase font-bold opacity-50 mb-2">Total Geral</p><h2 class="text-5xl font-black tracking-tighter">R$ <span id="pdvTotal">0,00</span></h2></div>
                        <button onclick="handleFinalizarVenda()" class="bg-green-500 py-6 rounded-3xl font-black text-xl uppercase shadow-lg hover:scale-105 transition-transform">Finalizar Venda</button>
                    </div>
                </section>

                <section id="tab-estoque" class="hidden glass p-8">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <input type="hidden" id="editProdId"><input type="text" id="estNome" placeholder="Produto" class="p-4 rounded-xl outline-none"><input type="number" id="estQtd" placeholder="Qtd" class="p-4 rounded-xl outline-none"><input type="number" id="estPreco" placeholder="Preço" class="p-4 rounded-xl outline-none"><button onclick="handleSalvarProduto()" class="bg-blue-600 font-bold rounded-xl uppercase text-xs">Salvar</button>
                    </div>
                    <table class="w-full text-left"><tbody id="corpoEstoque"></tbody></table>
                </section>

                <section id="tab-clientes" class="hidden glass p-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <input type="hidden" id="editCliId"><input type="text" id="cliNome" placeholder="Nome" class="p-4 rounded-xl outline-none"><input type="text" id="cliWhats" placeholder="WhatsApp" class="p-4 rounded-xl outline-none"><button onclick="handleSalvarCliente()" class="bg-green-600 font-bold rounded-xl uppercase text-xs">Salvar</button>
                    </div>
                    <table class="w-full text-left"><tbody id="corpoClientes"></tbody></table>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBeL1Lbq71SfKoZQ4G26aZFPsiS5IFL9I",
            authDomain: "sistema-plac.firebaseapp.com",
            projectId: "sistema-plac",
            storageBucket: "sistema-plac.firebasestorage.app",
            messagingSenderId: "54513790116",
            appId: "1:54513790116:web:77d0722e5a8b8b10dfca31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let produtos = [], clientes = [], vendas = [], carrinho = [], myChart;

        window.tentarLogin = async () => {
            const pass = document.getElementById('passInput').value;
            if(pass === "123") {
                const btn = document.getElementById('btnLogin');
                btn.classList.add('is-loading');
                btn.disabled = true;

                try {
                    await carregarTudo();
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    // Pequeno atraso para o Chart.js não bugar com a animação da tela
                    setTimeout(() => atualizarDash(), 300);
                } catch (e) {
                    alert("Erro ao conectar com Firebase. Tente novamente.");
                    console.error(e);
                } finally {
                    btn.classList.remove('is-loading');
                    btn.disabled = false;
                }
            } else { alert("Senha incorreta!"); }
        };

        async function carregarTudo() {
            const prodSnap = await getDocs(collection(db, "produtos"));
            produtos = prodSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            if (produtos.length === 0) {
                await criarExemplos();
                return carregarTudo(); 
            }

            const cliSnap = await getDocs(collection(db, "clientes"));
            clientes = cliSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            try {
                const vndaSnap = await getDocs(query(collection(db, "vendas"), orderBy("data", "desc")));
                vendas = vndaSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) { vendas = []; }

            renderTudo();
        }

        async function criarExemplos() {
            const exProds = [{nome: "Chapa Drywall ST 12.5mm", qtd: 50, preco: 34.90}, {nome: "Perfil Montante 70mm", qtd: 100, preco: 22.50}];
            const exClis = [{nome: "Cliente de Teste", whats: "11999999999"}];
            for(let p of exProds) await addDoc(collection(db, "produtos"), p);
            for(let c of exClis) await addDoc(collection(db, "clientes"), c);
        }

        window.showTab = (tab) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('btn-' + tab).classList.add('active-tab');
            document.getElementById('tab-title').innerText = tab.toUpperCase();
            if(tab === 'dashboard') atualizarDash();
        };

        window.handleSalvarProduto = async () => {
            const id = document.getElementById('editProdId').value;
            const dados = { nome: document.getElementById('estNome').value, qtd: parseInt(document.getElementById('estQtd').value), preco: parseFloat(document.getElementById('estPreco').value) };
            id ? await updateDoc(doc(db, "produtos", id), dados) : await addDoc(collection(db, "produtos"), dados);
            limparForms(); await carregarTudo();
        };

        window.handleSalvarCliente = async () => {
            const id = document.getElementById('editCliId').value;
            const dados = { nome: document.getElementById('cliNome').value, whats: document.getElementById('cliWhats').value };
            id ? await updateDoc(doc(db, "clientes", id), dados) : await addDoc(collection(db, "clientes"), dados);
            limparForms(); await carregarTudo();
        };

        window.handleAdicionarAoCarrinho = () => {
            const p = produtos.find(item => item.id === document.getElementById('pdvSelect').value);
            const qtd = parseInt(document.getElementById('pdvQtd').value);
            if(p && qtd <= p.qtd) {
                carrinho.push({...p, qtdVenda: qtd, subtotal: p.preco * qtd});
                renderCarrinho();
            } else { alert("Estoque insuficiente!"); }
        };

        window.handleFinalizarVenda = async () => {
            if(carrinho.length === 0) return;
            const venda = { cliente: document.getElementById('pdvCliente').value, total: carrinho.reduce((a,b) => a + b.subtotal, 0), data: new Date().toISOString() };
            await addDoc(collection(db, "vendas"), venda);
            for(let item of carrinho) {
                const p = produtos.find(x => x.id === item.id);
                await updateDoc(doc(db, "produtos", p.id), { qtd: p.qtd - item.qtdVenda });
            }
            carrinho = []; await carregarTudo(); showTab('dashboard');
        };

        window.handleDeletar = async (col, id) => {
            if(confirm("Excluir?")) { await deleteDoc(doc(db, col, id)); await carregarTudo(); }
        };

        window.handleRemoverCarrinho = (i) => { carrinho.splice(i,1); renderCarrinho(); };

        function renderTudo() { renderEstoque(); renderClientes(); renderPDV(); renderCarrinho(); atualizarDash(); }

        function renderEstoque() {
            document.getElementById('corpoEstoque').innerHTML = produtos.map(p => `
                <tr class="hover:bg-white/5 border-b border-white/5"><td class="p-4 font-bold text-[11px] uppercase">${p.nome}</td><td class="p-4">${p.qtd} UN</td><td class="p-4 font-black">R$ ${p.preco.toFixed(2)}</td><td class="p-4 text-right"><button onclick="handleDeletar('produtos', '${p.id}')" class="opacity-20 hover:opacity-100 hover:text-red-400"><i class="fas fa-trash"></i></button></td></tr>
            `).join('');
        }

        function renderClientes() {
            document.getElementById('corpoClientes').innerHTML = clientes.map(c => `
                <tr class="hover:bg-white/5 border-b border-white/5"><td class="p-4 font-bold text-[11px] uppercase">${c.nome}</td><td class="p-4 text-blue-300 font-bold">${c.whats}</td><td class="p-4 text-right"><button onclick="handleDeletar('clientes', '${c.id}')" class="opacity-20 hover:opacity-100 hover:text-red-400"><i class="fas fa-trash"></i></button></td></tr>
            `).join('');
        }

        function renderPDV() {
            document.getElementById('pdvCliente').innerHTML = clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('pdvSelect').innerHTML = produtos.map(p => `<option value="${p.id}">${p.nome} - R$ ${p.preco}</option>`).join('');
        }

        function renderCarrinho() {
            let t = 0;
            document.getElementById('carrinhoItens').innerHTML = carrinho.map((c, i) => {
                t += c.subtotal;
                return `<tr class="border-b border-white/5"><td class="py-4 font-bold uppercase">${c.nome}</td><td class="text-center font-bold">${c.qtdVenda}x</td><td class="text-right font-black">R$ ${c.subtotal.toFixed(2)}</td><td class="text-right pl-4" onclick="handleRemoverCarrinho(${i})"><i class="fas fa-times text-red-400 cursor-pointer"></i></td></tr>`;
            }).join('');
            document.getElementById('pdvTotal').innerText = t.toFixed(2).replace('.', ',');
        }

        function atualizarDash() {
            document.getElementById('dash-estoque-count').innerText = produtos.length;
            document.getElementById('dash-clientes-count').innerText = clientes.length;
            const total = vendas.reduce((acc, v) => acc + v.total, 0);
            document.getElementById('dash-vendas-total').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('vendasChart');
            if(!ctx || document.getElementById('app-content').classList.contains('hidden')) return;
            const ultimas = vendas.slice(0, 5).reverse();
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: {
                    labels: ultimas.map(v => new Date(v.data).toLocaleDateString()),
                    datasets: [{ label: 'Vendas', data: ultimas.map(v => v.total), borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function limparForms() {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('pdvQtd').value = '1';
        }
    </script>
</body>
</html>
