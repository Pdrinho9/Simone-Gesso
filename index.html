<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAC Drywall - Gestão Nuvem</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --plac-blue: #0d1b3e; --plac-accent: #3b82f6; }
        body { background: linear-gradient(135deg, #0d1b3e 0%, #1e293b 100%); background-attachment: fixed; min-height: 100vh; color: white; font-family: sans-serif; font-size: 13px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .nav-btn { width: 100%; display: flex; align-items: center; padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; transition: all 0.3s; margin-bottom: 4px; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(5px); }
        .active-tab { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 100%) !important; border-left: 4px solid var(--plac-accent) !important; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; height: 38px; padding: 0 10px !important; border-radius: 8px !important; font-size: 12px !important; }
        #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0d1b3e; }
        #print-area { display: none; background: white !important; color: black !important; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="print-area">
        <div style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin:0">PLAC DRYWALL</h2>
            <p style="font-size: 11px; margin: 5px 0;">Rua Neuza Francisca dos Santos, 434 - Sumaré/SP</p>
            <p style="font-size: 11px; font-weight: bold;">WhatsApp: (19) 98814-7888</p>
        </div>
        <div id="print-content" style="color: black;"></div>
    </div>

    <div id="login-screen">
        <div class="glass p-8 w-80 text-center shadow-2xl bg-white/5">
            <div class="mb-6"><img src="logo.png" alt="PLAC Drywall" class="w-32 mx-auto"></div>
            <input type="password" id="passInput" placeholder="Senha" class="w-full mb-4 text-center font-bold">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-[10px] hover:bg-blue-500 shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="app-content" class="h-screen flex" style="display: none;">
        <aside class="w-64 glass m-3 mr-1 flex flex-col p-3">
            <div class="p-4 mb-4 text-center"><img src="logo.png" alt="Logo" class="w-32 mx-auto"></div>
            <nav class="flex-1 space-y-1">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="nav-btn active-tab"><i class="fas fa-home mr-3 text-blue-400"></i> Início</button>
                <button onclick="showTab('pdv')" id="btn-pdv" class="nav-btn"><i class="fas fa-shopping-bag mr-3 text-yellow-400"></i> PDV / Vendas</button>
                <button onclick="showTab('financeiro')" id="btn-financeiro" class="nav-btn"><i class="fas fa-wallet mr-3 text-green-400"></i> Financeiro</button>
                <button onclick="showTab('clientes')" id="btn-clientes" class="nav-btn"><i class="fas fa-user-friends mr-3 text-purple-400"></i> Clientes</button>
                <button onclick="showTab('estoque')" id="btn-estoque" class="nav-btn"><i class="fas fa-box-open mr-3 text-orange-400"></i> Estoque</button>
            </nav>
            <div class="pt-3 border-t border-white/10"><button onclick="location.reload()" class="nav-btn text-red-400 hover:bg-red-500/10"><i class="fas fa-power-off mr-3"></i> Sair</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden m-3 ml-1">
            <header class="glass p-4 px-6 flex justify-between items-center mb-3">
                <h1 id="tab-title" class="text-xs font-black uppercase tracking-widest text-blue-400">Dashboard</h1>
                <div class="text-[9px] font-bold text-green-400 uppercase tracking-widest"><i class="fas fa-check-circle mr-1"></i> Cloud Online</div>
            </header>

            <div class="overflow-y-auto h-full pr-2 space-y-4">
                
                <section id="tab-dashboard" class="tab-content">
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div class="glass p-6 text-center border-b-4 border-blue-500"><p class="text-[9px] uppercase opacity-50 mb-1">Faturamento</p><h2 class="text-xl font-black" id="dash-vendas-total">R$ 0,00</h2></div>
                        <div class="glass p-6 text-center border-b-4 border-purple-500"><p class="text-[9px] uppercase opacity-50 mb-1">Clientes</p><h2 class="text-xl font-black" id="dash-clientes-count">0</h2></div>
                        <div class="glass p-6 text-center border-b-4 border-orange-500"><p class="text-[9px] uppercase opacity-50 mb-1">Itens</p><h2 class="text-xl font-black" id="dash-estoque-count">0</h2></div>
                    </div>
                </section>

                <section id="tab-financeiro" class="tab-content hidden glass p-6">
                    <div class="flex justify-between items-end mb-6">
                        <h2 class="text-lg font-black uppercase">Fluxo de Caixa</h2>
                        <div class="bg-green-500/20 text-green-400 px-4 py-2 rounded-xl font-black text-xl border border-green-500/30" id="fin-total-geral">R$ 0,00</div>
                    </div>
                    <table class="w-full text-left text-xs">
                        <thead><tr class="opacity-40 uppercase text-[9px] border-b border-white/10"><th class="pb-3">Data</th><th class="pb-3">Cliente</th><th class="pb-3 text-right">Valor</th><th class="pb-3 text-right">Ações</th></tr></thead>
                        <tbody id="corpoFinanceiro"></tbody>
                    </table>
                </section>

                <section id="tab-pdv" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="lg:col-span-2 glass p-6 space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-[9px] opacity-50 mb-1 block uppercase">Cliente</label><div class="flex gap-2"><select id="pdvCliente" class="flex-1"></select><button onclick="showTab('clientes')" class="bg-blue-600 px-3 rounded-lg">+</button></div></div>
                            <div><label class="text-[9px] opacity-50 mb-1 block uppercase">Produto</label><select id="pdvSelect" class="w-full"></select></div>
                        </div>
                        <div class="flex gap-3 items-end">
                            <div class="w-20"><label class="text-[9px] opacity-50 mb-1 block uppercase">Qtd</label><input type="number" id="pdvQtd" value="1" min="1" class="w-full text-center"></div>
                            <button onclick="handleAdicionarAoCarrinho()" class="flex-1 bg-blue-600 py-3 font-black uppercase text-[10px] rounded-lg">Inserir no Carrinho</button>
                        </div>
                        <table class="w-full text-[11px] mt-2"><thead><tr class="opacity-30 text-left border-b border-white/10"><th class="pb-2">Item</th><th class="pb-2 text-center">Preço</th><th class="pb-2 text-center">Qtd</th><th class="pb-2 text-right">Subtotal</th><th></th></tr></thead><tbody id="carrinhoItens"></tbody></table>
                    </div>
                    <div class="glass p-6 flex flex-col justify-between bg-blue-600/10 border-l-4 border-blue-500">
                        <div>
                            <p class="text-[9px] uppercase font-bold opacity-50 mb-1 text-blue-400">Total da Venda</p>
                            <h2 class="text-4xl font-black mb-4 tracking-tighter">R$ <span id="pdvTotal">0,00</span></h2>
                            <label class="text-[9px] opacity-50 mb-1 block uppercase font-bold text-yellow-500">Valor do Frete (R$)</label>
                            <input type="number" id="pdvFrete" value="0" oninput="renderCarrinho()" class="w-full mb-3">
                            <label class="text-[9px] opacity-50 mb-1 block uppercase font-bold">Forma de Pagamento</label>
                            <select id="pdvPagamento" class="w-full mb-4"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option></select>
                        </div>
                        <div class="space-y-2">
                            <button onclick="handleFinalizarVenda()" class="w-full bg-green-500 py-4 rounded-2xl font-black text-lg uppercase shadow-lg">Finalizar e Imprimir</button>
                            <button id="btnWhatsapp" onclick="enviarWhatsApp()" style="display:none;" class="w-full bg-green-600 py-3 rounded-xl font-bold uppercase text-[9px]"><i class="fab fa-whatsapp mr-1"></i> Enviar Comprovante</button>
                            <button onclick="imprimirOrcamento()" class="w-full bg-yellow-600/20 text-yellow-500 py-3 rounded-xl font-bold uppercase text-[9px]">Imprimir Orçamento</button>
                        </div>
                    </div>
                </section>

                <section id="tab-estoque" class="tab-content hidden glass p-6">
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <input type="hidden" id="editProdId"><input type="text" id="estNome" placeholder="Nome do Produto"><input type="number" id="estQtd" placeholder="Qtd">
                        <input type="number" id="estPreco" placeholder="Preço Venda"><input type="text" id="estNcm" placeholder="NCM"><input type="number" id="estIpi" placeholder="IPI %">
                        <button onclick="handleSalvarProduto()" id="btnSalvarProd" class="bg-blue-600 font-bold rounded-lg uppercase text-[10px] p-2">Salvar</button>
                    </div>
                    <table class="w-full text-left text-xs"><tbody id="corpoEstoque" class="divide-y divide-white/5"></tbody></table>
                </section>

                <section id="tab-clientes" class="tab-content hidden glass p-6">
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <input type="hidden" id="editCliId"><input type="text" id="cliNome" placeholder="Nome Completo"><input type="text" id="cliWhats" placeholder="WhatsApp (DDD)">
                        <input type="text" id="cliCpf" placeholder="CPF/CNPJ"><input type="text" id="cliEndereco" placeholder="Endereço de Entrega">
                        <button onclick="handleSalvarCliente()" id="btnSalvarCli" class="col-span-2 bg-green-600 font-bold rounded-lg uppercase text-[10px] p-2">Salvar Cliente</button>
                    </div>
                    <table class="w-full text-left text-xs"><tbody id="corpoClientes" class="divide-y divide-white/5"></tbody></table>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBBeL1Lbq71SfKoZQ4G26aZFPsiS5IFL9I", authDomain: "sistema-plac.firebaseapp.com", projectId: "sistema-plac", storageBucket: "sistema-plac.firebasestorage.app", messagingSenderId: "54513790116", appId: "1:54513790116:web:77d0722e5a8b8b10dfca31" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let produtos = [], clientes = [], vendas = [], carrinho = [], ultimaVendaSalva = null;

        window.tentarLogin = () => { if(document.getElementById('passInput').value === "123456") { document.getElementById('login-screen').style.display='none'; document.getElementById('app-content').style.display='flex'; carregarDadosIniciais(); window.showTab('dashboard'); } else alert("Acesso Negado!"); };

        async function carregarDadosIniciais() { 
            const pSnap = await getDocs(collection(db, "produtos")); produtos = pSnap.docs.map(d => ({ id: d.id, ...d.data() })); 
            const cSnap = await getDocs(collection(db, "clientes")); clientes = cSnap.docs.map(d => ({ id: d.id, ...d.data() })); 
            const vSnap = await getDocs(query(collection(db, "vendas"), orderBy("data", "desc"))); vendas = vSnap.docs.map(d => ({ id: d.id, ...d.data() })); 
            renderTudo(); 
        }

        window.showTab = (tabId) => { 
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tabId).classList.remove('hidden'); 
            document.getElementById('btn-' + tabId).classList.add('active-tab');
            if(tabId === 'financeiro') renderFinanceiro(); 
        };

        function dispararImpressao(v, titulo) {
            document.getElementById('print-content').innerHTML = `
                <div style="text-align:center;font-weight:bold;margin-bottom:10px;text-transform:uppercase;">${titulo}</div>
                <p style="font-size:10px"><b>DATA:</b> ${new Date(v.data).toLocaleString()}</p>
                <p style="font-size:10px"><b>CLIENTE:</b> ${v.cliente}</p>
                <table style="width:100%;font-size:10px;border-top:1px dashed #000;margin-top:10px">
                    <thead><tr><th style="text-align:left">Item</th><th style="text-align:center">Preço Un.</th><th style="text-align:center">Qtd</th><th style="text-align:right">Subtotal</th></tr></thead>
                    <tbody>${v.itens.map(i => `<tr><td>${i.nome}</td><td style="text-align:center">R$ ${i.preco.toFixed(2)}</td><td style="text-align:center">${i.qtdVenda}</td><td style="text-align:right">R$ ${i.subtotal.toFixed(2)}</td></tr>`).join('')}</tbody>
                </table>
                <div style="text-align:right;border-top:1px solid #000;margin-top:5px;font-size:10px">
                    <p>Subtotal: R$ ${(v.total - (v.frete || 0)).toFixed(2)}</p>
                    <p>Frete: R$ ${(v.frete || 0).toFixed(2)}</p>
                    <h3 style="font-size:14px;margin:0">TOTAL: R$ ${v.total.toFixed(2)}</h3>
                    <p style="font-size:9px">Pagamento: ${v.pagamento || 'N/A'}</p>
                </div>`;
            window.print();
        }

        window.imprimirOrcamento = () => {
            if(carrinho.length === 0) return alert("Adicione itens!");
            const f = parseFloat(document.getElementById('pdvFrete').value) || 0;
            const orc = { cliente: document.getElementById('pdvCliente').value, total: carrinho.reduce((a,b)=>a+b.subtotal,0) + f, frete: f, itens: carrinho, data: new Date().toISOString() };
            dispararImpressao(orc, "ORÇAMENTO DE VENDA");
        };

        window.handleAdicionarAoCarrinho = () => { 
            const p = produtos.find(i => i.id === document.getElementById('pdvSelect').value); 
            const q = parseInt(document.getElementById('pdvQtd').value); 
            if(p && p.qtd >= q) { carrinho.push({...p, qtdVenda: q, subtotal: p.preco * q}); renderCarrinho(); } else alert("Estoque insuficiente!"); 
        };

        window.renderCarrinho = () => { 
            let t = 0; let f = parseFloat(document.getElementById('pdvFrete').value) || 0;
            document.getElementById('carrinhoItens').innerHTML = carrinho.map((c, i) => { 
                t += c.subtotal; return `<tr class="border-b border-white/5"><td class="py-2 text-blue-300 font-bold uppercase">${c.nome}</td><td class="text-center">R$ ${c.preco.toFixed(2)}</td><td class="text-center">${c.qtdVenda}</td><td class="text-right font-bold">R$ ${c.subtotal.toFixed(2)}</td><td class="text-right" onclick="carrinho.splice(${i},1);renderCarrinho()"><i class="fas fa-trash text-red-500 cursor-pointer p-1"></i></td></tr>`; 
            }).join(''); 
            document.getElementById('pdvTotal').innerText = (t + f).toFixed(2).replace('.', ','); 
        };
        
        window.handleFinalizarVenda = async () => {
            if(carrinho.length === 0) return;
            const frete = parseFloat(document.getElementById('pdvFrete').value) || 0;
            const v = { cliente: document.getElementById('pdvCliente').value, total: carrinho.reduce((a,b)=>a+b.subtotal,0) + frete, frete: frete, pagamento: document.getElementById('pdvPagamento').value, itens: carrinho, data: new Date().toISOString() };
            await addDoc(collection(db, "vendas"), v);
            for(let i of carrinho) await updateDoc(doc(db, "produtos", i.id), { qtd: i.qtd - i.qtdVenda });
            ultimaVendaSalva = v; document.getElementById('btnWhatsapp').style.display = 'block';
            dispararImpressao(v, "COMPROVANTE DE VENDA");
            carrinho = []; document.getElementById('pdvFrete').value = 0; carregarDadosIniciais();
        };

        window.enviarWhatsApp = () => {
            if(!ultimaVendaSalva) return;
            const cli = clientes.find(c => c.nome === ultimaVendaSalva.cliente);
            const num = cli ? cli.whats.replace(/\D/g,'') : '';
            let msg = `*PLAC DRYWALL - COMPROVANTE*\n\n`;
            ultimaVendaSalva.itens.forEach(i => msg += `• ${i.nome} (${i.qtdVenda}x R$ ${i.preco.toFixed(2)}) = R$ ${i.subtotal.toFixed(2)}\n`);
            msg += `\n*Frete:* R$ ${ultimaVendaSalva.frete.toFixed(2)}\n*TOTAL:* R$ ${ultimaVendaSalva.total.toFixed(2)}`;
            window.open(`https://api.whatsapp.com/send?phone=55${num}&text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.renderFinanceiro = () => {
            let total = 0; const corpo = document.getElementById('corpoFinanceiro');
            corpo.innerHTML = vendas.map(v => { 
                total += v.total; 
                return `<tr class="border-b border-white/5"><td class="py-3 text-[10px] opacity-60">${new Date(v.data).toLocaleDateString()}</td><td class="font-bold uppercase">${v.cliente}</td><td class="text-right text-green-400 font-black">R$ ${v.total.toFixed(2)}</td><td class="text-right"><button onclick="estornarVenda('${v.id}')" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button></td></tr>`; 
            }).join('');
            document.getElementById('fin-total-geral').innerText = "R$ " + total.toFixed(2).replace('.', ',');
        };

        window.estornarVenda = async (id) => {
            if(!confirm("Excluir venda e devolver estoque?")) return;
            const v = vendas.find(x => x.id === id);
            if(v && v.itens) {
                for(let i of v.itens) { 
                    const p = produtos.find(prod => prod.id === i.id); 
                    if(p) await updateDoc(doc(db, "produtos", i.id), { qtd: p.qtd + i.qtdVenda }); 
                }
            }
            await deleteDoc(doc(db, "vendas", id));
            carregarDadosIniciais();
        };

        window.prepararEdicaoProd = (id) => {
            const p = produtos.find(item => item.id === id);
            if(!p) return;
            document.getElementById('editProdId').value = p.id;
            document.getElementById('estNome').value = p.nome;
            document.getElementById('estQtd').value = p.qtd;
            document.getElementById('estPreco').value = p.preco;
            document.getElementById('estNcm').value = p.ncm || '';
            document.getElementById('estIpi').value = p.ipi || '';
            document.getElementById('btnSalvarProd').innerText = "Atualizar";
        };

        window.handleSalvarProduto = async () => {
            const id = document.getElementById('editProdId').value;
            const d = { nome: document.getElementById('estNome').value, qtd: parseInt(document.getElementById('estQtd').value)||0, preco: parseFloat(document.getElementById('estPreco').value)||0, ncm: document.getElementById('estNcm').value||'', ipi: document.getElementById('estIpi').value||'' };
            id ? await updateDoc(doc(db, "produtos", id), d) : await addDoc(collection(db, "produtos"), d);
            document.getElementById('btnSalvarProd').innerText = "Salvar";
            limparForms(); carregarDadosIniciais();
        };

        window.prepararEdicaoCli = (id) => {
            const c = clientes.find(item => item.id === id);
            if(!c) return;
            document.getElementById('editCliId').value = c.id;
            document.getElementById('cliNome').value = c.nome;
            document.getElementById('cliWhats').value = c.whats;
            document.getElementById('cliCpf').value = c.cpf || '';
            document.getElementById('cliEndereco').value = c.endereco || '';
            document.getElementById('btnSalvarCli').innerText = "Atualizar Cliente";
        };

        window.handleSalvarCliente = async () => {
            const id = document.getElementById('editCliId').value;
            const d = { nome: document.getElementById('cliNome').value, whats: document.getElementById('cliWhats').value, cpf: document.getElementById('cliCpf').value||'', endereco: document.getElementById('cliEndereco').value||'' };
            id ? await updateDoc(doc(db, "clientes", id), d) : await addDoc(collection(db, "clientes"), d);
            document.getElementById('btnSalvarCli').innerText = "Salvar Cliente";
            limparForms(); carregarDadosIniciais();
        };

        window.handleDeletar = async (col, id) => { if(confirm("Deseja mesmo excluir?")) { await deleteDoc(doc(db, col, id)); carregarDadosIniciais(); } };

        function renderTudo() {
            document.getElementById('corpoEstoque').innerHTML = produtos.map(p => `<tr class="border-b border-white/5"><td class="py-2 text-[11px] font-bold uppercase">${p.nome}</td><td class="text-center">${p.qtd}</td><td class="text-right">R$ ${p.preco.toFixed(2)}</td><td class="text-right whitespace-nowrap"><button onclick="prepararEdicaoProd('${p.id}')" class="text-blue-400 mr-3 opacity-60 hover:opacity-100"><i class="fas fa-edit"></i></button><button onclick="handleDeletar('produtos', '${p.id}')" class="text-red-500 opacity-20 hover:opacity-100"><i class="fas fa-trash"></i></button></td></tr>`).join('');
            document.getElementById('corpoClientes').innerHTML = clientes.map(c => `<tr class="border-b border-white/5"><td class="py-2 text-[11px] uppercase">${c.nome}</td><td class="text-center">${c.whats}</td><td class="text-right whitespace-nowrap"><button onclick="prepararEdicaoCli('${c.id}')" class="text-blue-400 mr-3 opacity-60 hover:opacity-100"><i class="fas fa-edit"></i></button><button onclick="handleDeletar('clientes', '${c.id}')" class="text-red-500 opacity-20 hover:opacity-100"><i class="fas fa-trash"></i></button></td></tr>`).join('');
            document.getElementById('pdvCliente').innerHTML = clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('pdvSelect').innerHTML = produtos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('dash-vendas-total').innerText = "R$ " + vendas.reduce((a,b)=>a+b.total,0).toFixed(2).replace('.', ',');
            document.getElementById('dash-estoque-count').innerText = produtos.length; document.getElementById('dash-clientes-count').innerText = clientes.length;
        }

        function limparForms() { document.querySelectorAll('input').forEach(i => i.value = ''); document.getElementById('editProdId').value = ""; document.getElementById('editCliId').value = ""; }
    </script>
</body>
</html>
